# ══════════════════════════════════════════════════════════════════════
#  Zonvo TURN Server — Coturn Configuration
#  VPS: 52.249.217.26  (TURN VPS — completely separate from App & Media)
# ══════════════════════════════════════════════════════════════════════

# ── Listening Ports ────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# ── Public IP (External) ───────────────────────────────────────────────
external-ip=52.249.217.26

# ── Listen on all interfaces ────────────────────────────────────────────
listening-ip=0.0.0.0

# ── Relay address (same as external) ──────────────────────────────────
relay-ip=0.0.0.0

# ── Realm & Server Name ────────────────────────────────────────────────
realm=turn.webinar.zonvo.tech
server-name=turn.webinar.zonvo.tech

# ── Authentication ────────────────────────────────────────────────────
# Long-term credential mechanism (standard TURN auth)
lt-cred-mech

# Shared secret for time-limited credentials (used with MediaSoup)
use-auth-secret
static-auth-secret=zonvo_turn_secret_2024

# ── Relay Ports ────────────────────────────────────────────────────────
min-port=49152
max-port=65535

# ── TLS Certificate (self-signed — replace with Let's Encrypt later) ──
cert=/etc/coturn/certs/turn.crt
pkey=/etc/coturn/certs/turn.key

# ── Security ─────────────────────────────────────────────────────────
no-software-attribute
fingerprint
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Block local loopback (prevents SSRF)
denied-peer-ip=127.0.0.0-127.255.255.255

# ── Logging ───────────────────────────────────────────────────────────
log-file=/var/log/coturn/turn.log
log-binding
new-log-timestamp
log-date-format=%Y-%m-%dT%H:%M:%S
verbose

# ── Performance ───────────────────────────────────────────────────────
# Max allocation: 10000 sessions
max-allocate-lifetime=3600
stale-nonce=600
channel-lifetime=600
permission-lifetime=300

# ── Prometheus Stats (optional — comment out if not using) ───────────
# prometheus
